name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    name: Backend - lint, types, security audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check app

      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports --no-strict-optional || true

      - name: pip-audit
        run: pip-audit --strict --skip-editable || true

  frontend:
    name: Frontend - lint, types, npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high || true

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://example.com
        run: npm run build

  docker:
    name: Docker - build & Trivy scan
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t secscan-backend:ci ./backend
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "secscan-backend:ci"
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
